<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Search Results</title>
    <style>
      body {
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #1e1e2f;
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 20px;
        box-sizing: border-box;
        min-height: 100vh;
      }

      .header-container {
        width: 100%;
        max-width: 500px;
        text-align: left;
        margin-bottom: 20px;
        padding-bottom: 15px;
        border-bottom: 1px solid #3a3a55;
      }

      h2 {
        margin: 0 0 5px 0;
        font-size: 22px;
        color: #fff;
      }

      p.subtitle {
        margin: 0;
        color: #1e90ff;
        font-size: 14px;
        font-weight: 500;
      }

      #results-container {
        width: 100%;
        max-width: 500px;
      }

      .card {
        background: #2a2a40;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        display: block;
        text-decoration: none;
        transition: background 0.2s;
        -webkit-tap-highlight-color: transparent;
      }

      .card:active {
        background: #32324c;
      }

      .title {
        font-size: 16px;
        font-weight: 600;
        color: #1e90ff;
        margin-bottom: 6px;
        line-height: 1.3;
      }

      .url {
        font-size: 12px;
        color: #2ed573; /* Green for safe URLs */
        margin-bottom: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .snippet {
        font-size: 14px;
        line-height: 1.5;
        color: #dcdde1;
      }

      .loader, .error-state {
        text-align: center;
        padding: 40px 20px;
        color: #888;
        font-size: 15px;
      }

      .error-state {
        color: #ff4757;
      }
    </style>
  </head>
  <body>
    <div class="header-container">
      <h2>Web Results</h2>
      <p class="subtitle" id="subtitle">Browsing the live web</p>
    </div>

    <div id="results-container">
      <div class="loader">Decoding web data...</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const query = params.get("q");
      const compressedData = params.get("data");

      if (query) {
        document.getElementById("subtitle").innerText = `Searched for: "${query}"`;
      }

      const container = document.getElementById('results-container');
      container.innerHTML = ''; 

      if (compressedData) {
        try {
          const decodedData = decodeURIComponent(escape(atob(compressedData)));
          const results = JSON.parse(decodedData);

          if (results.length === 0) {
            container.innerHTML = '<div class="loader">No results found on the web.</div>';
          } else if (results[0] && results[0].error) {
            container.innerHTML = `<div class="error-state">Error: ${results[0].message}</div>`;
          } else {
            results.forEach(item => {
              // Create an anchor tag wrapping the entire card for easy tapping
              const card = document.createElement('a');
              card.className = 'card';
              card.href = item.url;
              card.target = '_blank'; // Attempt to open in browser
              
              card.innerHTML = `
                <div class="title">${item.title}</div>
                <div class="url">${item.url}</div>
                <div class="snippet">${item.snippet}</div>
              `;
              
              container.appendChild(card);
            });
          }
        } catch (e) {
          container.innerHTML = '<div class="error-state">Failed to decode results payload.</div>';
          console.error(e);
        }
      } else {
        container.innerHTML = '<div class="loader">Waiting for search query...</div>';
      }
    </script>
  </body>
</html>
