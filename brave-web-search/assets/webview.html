<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Preview Card</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #1e1e2f;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        cursor: pointer;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .icon {
        font-size: 42px;
        margin-bottom: 8px;
      }
      h2 {
        margin: 0 0 8px 0;
        font-size: 18px;
        color: #1e90ff; /* Bright blue for web search */
      }
      p {
        margin: 0;
        color: #aaa;
        font-size: 14px;
      }
      .btn {
        background: #1e90ff;
        color: white;
        padding: 10px 24px;
        border-radius: 20px;
        font-weight: bold;
        font-size: 14px;
        margin-top: 15px;
        box-shadow: 0 4px 10px rgba(30, 144, 255, 0.3);
        transition: transform 0.1s;
      }
      body:active .btn {
        transform: scale(0.95);
      }
    </style>
  </head>
  <body>
    <div class="icon">🔍</div>
    <h2 id="title">Searching Web...</h2>
    <p>Tap to view sources</p>
    <div class="btn">OPEN RESULTS</div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const query = params.get("q") || "Web Search";
      const compressedData = params.get("data") || "";

      // Truncate long queries for the preview card
      let displayQuery = query.length > 25 ? query.substring(0, 22) + "..." : query;
      document.getElementById("title").innerText = `Results for "${displayQuery}"`;

      // Point to the full UI file in the same directory
      const uiUrl = `ui.html?q=${encodeURIComponent(query)}&data=${encodeURIComponent(compressedData)}`;

      const redirect = (e) => {
        e.preventDefault();
        window.location.href = uiUrl;
      };

      document.body.addEventListener("click", redirect);
      document.body.addEventListener("touchstart", redirect);
    </script>
  </body>
</html>
